<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yu-Chuan Hao</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">

  <h1 class="text-3xl font-bold mb-6">Yu-Chuan Hao</h1>

  <h2 class="text-xl mb-4">Projects</h2>

  <div class="grid md:grid-cols-2 gap-4">

    <!-- Left: Project List -->
    <div id="project-list"></div>

    <!-- Right: Detail -->
    <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5">
      <h3 id="title" class="font-bold mb-2"></h3>
      <p id="challenge"></p>
      <div id="approach" class="mt-2"></div>
      <div id="impact" class="mt-2"></div>
    </div>

  </div>

  <h2 class="text-xl mt-8 mb-4">Contact</h2>
  <p>max850502@gmail.com</p>
  <p>maxhao@stanford.edu</p>
  <p>ychaoc@tsmc.com</p>

<script>

const projects = [
  {
    title: "Probe Card Optimization",
    desc: "Improved probe yield by 70%",
    challenge: "Probe stability and alignment issues",
    approach: ["Data analysis", "Pattern detection"],
    impact: ["Yield improvement", "Faster tuning"]
  },
  {
    title: "Nanotwinned Ag",
    desc: "Thin film research",
    challenge: "Thermal stability",
    approach: ["SEM", "XRD"],
    impact: ["Mechanism discovery"]
  }
];

const list = document.getElementById("project-list");

function renderDetail(p) {
  document.getElementById("title").innerText = p.title;
  document.getElementById("challenge").innerText = p.challenge;
  document.getElementById("approach").innerHTML = p.approach.map(a => "- " + a).join("<br>");
  document.getElementById("impact").innerHTML = p.impact.map(i => "- " + i).join("<br>");
}

projects.forEach((p, i) => {
  const div = document.createElement("div");
  div.className = "rounded-2xl border border-slate-800 bg-slate-900 p-5 mb-3";
  div.innerHTML = `
    <p class="font-bold">${p.title}</p>
    <p class="text-gray-400">${p.desc}</p>
    <button class="mt-2 text-cyan-400">View</button>
  `;

  div.querySelector("button").onclick = () => renderDetail(p);
  list.appendChild(div);
});

renderDetail(projects[0]);

</script>

</body>
</html>
